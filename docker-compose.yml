version: '3.8'

networks:
  postgres_infra_network:
    external: true
  airflow_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
  whisper_network:
    external: true

volumes:
  airflow_logs:
  airflow_plugins:
  git_dags:
  airflow_data:

x-airflow-common:
  &airflow-common
  # Custom Airflow image with ffmpeg support
  # Build with: docker build -t airflow-custom:2.10.2-ffmpeg .
  image: airflow-custom:2.10.2-ffmpeg
  restart: unless-stopped
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor

    # Database connection (uses AIRFLOW_DB_NAME from .env: airflow_dev_db or airflow_db)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres_shared:5432/${AIRFLOW_DB_NAME:-airflow_db}
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # Installed packages
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres openai beautifulsoup4 requests urllib3 google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client Pillow PyPDF2 yt-dlp openai-whisper"

    # DAG folder and performance tweaks
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags/repo
    AIRFLOW__CORE__PARALLELISM: 1
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 1
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Europe/Madrid

    # ✅ Reduce scheduler CPU usage
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 120
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 120

    # API keys
    OPENAI_API_KEY: "${OPENAI_API_KEY}"
    YOUTUBE_API_KEY: "${YOUTUBE_API_KEY}"

    # PostgreSQL connection for your project
    POSTGRES_HOST: "${POSTGRES_HOST}"
    POSTGRES_PORT: "${POSTGRES_PORT}"
    POSTGRES_DB: "${POSTGRES_DB}"
    POSTGRES_USER: "${POSTGRES_USER}"
    POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    POSTGRES_SCHEMA: "${POSTGRES_SCHEMA}"
  volumes:
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
    - git_dags:/opt/airflow/dags:ro
    - airflow_data:/opt/airflow/data
    # Mount congress_videos directory from NAS (includes token, assets, videos, fonts)
    # Note: Token file must be writable for auto-refresh
    - /volume1/docker/airflow/congress_videos:/opt/airflow/data/congress_videos
  networks:
    - postgres_infra_network
    - airflow_network
    - whisper_network
  mem_limit: 1.5g
  mem_reservation: 1g

services:
  init-perms:
    image: busybox
    command:
      - sh
      - -c
      - |
        chown -R 65533:65533 /git
        chown -R 50000:0 /data
        chown -R 50000:0 /congress_videos
        chmod -R 755 /congress_videos/assets
        chmod 666 /congress_videos/congress_youtube_token.pickle
        chmod -R 775 /congress_videos/videos
    volumes:
      - git_dags:/git
      - airflow_data:/data
      - /volume1/docker/airflow/congress_videos:/congress_videos

  git-sync:
    image: k8s.gcr.io/git-sync/git-sync:v3.6.5
    container_name: airflow-git-sync
    user: "65533:65533"
    restart: unless-stopped
    depends_on:
      - init-perms
    environment:
      GIT_SYNC_REPO: "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git"
      GIT_SYNC_BRANCH: "dev"
      GIT_SYNC_WAIT: "15"
      GIT_SYNC_ROOT: "/git"
      GIT_SYNC_DEST: "repo"
    volumes:
      - git_dags:/git
    networks:
      - postgres_infra_network
      - airflow_network
      - whisper_network

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      - airflow-init
      - init-perms
      - git-sync
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
      - init-perms
      - git-sync
    command: scheduler

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Initialize the database (creates tables if they don't exist)
        airflow db init

        # Run migrations to ensure schema is up to date
        airflow db migrate
    user: "50000:50000"